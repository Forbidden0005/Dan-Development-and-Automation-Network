name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  python:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Lint critical correctness rules
        run: ruff check .

      - name: Run tests
        run: pytest --cov --cov-report=term-missing

  windows-packaging:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install packaging dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-packaging.txt

      - name: Run packaging unit tests
        run: pytest -q tests/test_build_windows.py tests/test_verify_windows_build.py tests/test_smoke_windows_cli.py

      - name: Verify release version sync
        run: python scripts/build_windows.py --target gui --dry-run

      - name: Build supported Windows GUI package
        run: python scripts/build_windows.py --target gui

      - name: Verify packaged output shape
        run: python scripts/verify_windows_build.py --target gui

      - name: Build packaged CLI companion
        run: python scripts/build_windows.py --target cli

      - name: Verify packaged CLI output shape
        run: python scripts/verify_windows_build.py --target cli

      - name: Run packaged CLI smoke test
        run: python scripts/smoke_windows_cli.py

      - name: Upload packaged GUI artifact
        uses: actions/upload-artifact@v4
        with:
          name: dan-windows-gui
          path: dist/windows/Dan/Dan
          if-no-files-found: error

      - name: Upload packaged CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: dan-windows-cli
          path: dist/windows/DanCLI/DanCLI
          if-no-files-found: error

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Build Windows installer
        run: python scripts/build_windows.py --installer-only

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: dan-windows-installer
          path: dist/installer/Dan-*-setup.exe
          if-no-files-found: error
